# Nextest config for the SITL end-to-end suite.
#
# Every test in this crate boots its own `px4` daemon, which binds the
# usual MAVLink UDP ports (14540, 14550, …). Two daemons can't coexist
# on those ports, so SITL tests must run serially. Other crates'
# unit tests in the workspace are unaffected.

[[profile.default.overrides]]
filter      = "package(px4-sitl-tests) and binary_id(/px4-sitl-tests::test::.+/)"
test-group  = "sitl"

[test-groups]
sitl = { max-threads = 1 }

# A single SITL test (boot + module spawn + log wait + clean shutdown)
# typically takes 3–5 seconds; allow generous slack for the cold first
# boot that triggers the cached PX4 build.
[profile.default]
slow-timeout      = { period = "30s", terminate-after = 4 }
status-level      = "pass"
final-status-level = "slow"
