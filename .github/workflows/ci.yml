name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # `just ci` = check + test + doc, exactly what a developer runs
  # locally. Three runners exercise the host-mock surface across
  # OSes — phase 09 wants the std-feature mocks (Sleep, Notify,
  # Channel, Pub/Sub round-trip) to work the same on Linux, macOS
  # and Windows so contributors aren't gated on a Linux box. The
  # host build never links a real PX4 — px4-sys falls back to its
  # vendored bindings snapshot when PX4_AUTOPILOT_DIR is unset.
  ci:
    name: just ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain (rust-toolchain.toml drives nightly)
        run: rustup show

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Run just ci
        # Force bash on Windows so the justfile's `set shell := ["bash", ...]`
        # finds the same interpreter the recipes assume.
        shell: bash
        run: just ci

  # Bare-metal cross builds. Every Pixhawk/STM target px4-rs claims to
  # support gets compiled here so a phase that breaks tier-3 target
  # support fails the build instead of getting noticed downstream.
  cross-build:
    name: cargo build --target ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabihf
          - thumbv8m.main-none-eabihf
          - riscv32imc-unknown-none-elf
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      # Host-only members (proc-macros + codegen lib) can't compile
      # for bare-metal targets because their proc-macro2 dep needs std.
      - name: Cross-build workspace
        run: |
          cargo build \
            --workspace --target ${{ matrix.target }} \
            --exclude xtask \
            --exclude px4-msg-codegen \
            --exclude px4-msg-macros \
            --exclude px4-workqueue-macros \
            --exclude px4-macros

      # Examples live outside the workspace (each has its own Cargo.toml
      # so users can copy one into their own EXTERNAL_MODULES_LOCATION
      # without inheriting workspace coupling). Walk the directory and
      # cross-build every one — phase-08 wants this enforced.
      - name: Cross-build standalone examples
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::cargo build --release ($dir → ${{ matrix.target }})"
              (cd "$dir" && cargo build --release --target ${{ matrix.target }})
              echo "::endgroup::"
            fi
          done

  # Snapshot freshness: shallow-clone the pinned PX4 tag, regenerate
  # crates/px4-sys/bindings/bindings.rs against it, and fail the build
  # if the diff isn't empty. Catches a PX4 ABI change before it
  # silently corrupts memory in a downstream firmware build.
  px4-sys-snapshot:
    name: px4-sys bindings snapshot vs PX4 v1.16.2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain
        run: rustup show

      - name: Install libclang for bindgen
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Shallow-clone PX4 v1.16.2
        run: |
          git clone --depth 1 --branch v1.16.2 \
            https://github.com/PX4/PX4-Autopilot.git "$HOME/PX4-Autopilot"

      - name: Regenerate bindings
        env:
          PX4_AUTOPILOT_DIR: ${{ github.workspace }}/../PX4-Autopilot
        run: |
          PX4_AUTOPILOT_DIR="$HOME/PX4-Autopilot" \
            cargo run -p xtask -- gen-sys --px4 "$HOME/PX4-Autopilot"

      - name: Fail on drift
        run: |
          if ! git diff --exit-code crates/px4-sys/bindings/bindings.rs; then
            echo "::error::px4-sys bindings snapshot is stale vs PX4 v1.16.2."
            echo "Run \`just gen-sys\` locally (with PX4_AUTOPILOT_DIR set) and"
            echo "commit the regenerated crates/px4-sys/bindings/bindings.rs."
            exit 1
          fi

  # Phase-13 Renode + NuttX e2e suite. The Rust fixture compiles
  # always; the actual test bodies skip-return via `ensure_renode!()`
  # unless both `RENODE` and `PX4_RENODE_FIRMWARE` are set. This job
  # confirms the fixture builds clean on every push and that the
  # smoke tests pass in their skip path. Once work item 13.1 lands
  # (the px4_renode_h743 PX4 board config), this job grows a step
  # that runs the Antmicro Renode Docker action against a built
  # firmware artifact.
  renode-e2e:
    name: tests/renode (skip-path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tests/renode/target
          key: cargo-renode-${{ runner.os }}-${{ hashFiles('tests/renode/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build the renode fixture crate
        run: cd tests/renode && cargo build

      - name: Run the renode test suite (skip path)
        # Without RENODE / PX4_RENODE_FIRMWARE, every test is
        # expected to print [SKIPPED] and exit zero.
        run: cd tests/renode && cargo test
